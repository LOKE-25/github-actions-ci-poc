name: GitHub Actions CI POC

on:
  push:
    branches:
      - main

jobs:

  gitleaks-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

